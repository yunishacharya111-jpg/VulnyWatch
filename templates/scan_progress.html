<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanning — VulnyWatch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .scan-container {
      text-align: center;
      padding: 40px;
      max-width: 550px;
      width: 100%;
    }
    .scan-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 40px;
    }
    .scan-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }
    h2 {
      color: #58a6ff;
      margin-bottom: 10px;
    }
    .url {
      color: #8b949e;
      margin-bottom: 30px;
      word-break: break-all;
      font-size: 0.9rem;
    }
    /* Progress Bar */
    .progress-bar-container {
      background: #0d1117;
      border-radius: 10px;
      height: 12px;
      margin: 20px 0;
      overflow: hidden;
      border: 1px solid #30363d;
    }
    .progress-bar {
      background: #238636;
      width: 0%;
      height: 100%;
      border-radius: 10px;
      transition: width 0.3s ease;
    }
    /* Scanning Steps */
    .steps {
      text-align: left;
      margin: 25px 0;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      color: #8b949e;
      font-size: 0.9rem;
      border-bottom: 1px solid #21262d;
    }
    .step.completed {
      color: #3fb950;
    }
    .step.active {
      color: #58a6ff;
    }
    .step-pending {
      color: #8b949e;
    }
    .status-text {
      margin-top: 20px;
      color: #58a6ff;
      font-size: 0.9rem;
    }
    .redirect-message {
      margin-top: 20px;
      color: #8b949e;
      font-size: 0.85rem;
    }
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #30363d;
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* Fun Fact Box */
    .fact-box {
      background: #0d1117;
      border-left: 4px solid #58a6ff;
      border-radius: 8px;
      padding: 15px;
      margin: 20px 0;
      text-align: left;
    }
    .fact-box .fact-icon {
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    .fact-box .fact-title {
      color: #58a6ff;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .fact-box .fact-text {
      color: #e6edf3;
      font-size: 0.9rem;
      line-height: 1.5;
    }
    .fact-box .fact-source {
      color: #8b949e;
      font-size: 0.7rem;
      margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="scan-container">
  <div class="scan-card">
    <div class="scan-icon">
      <div class="spinner" style="width: 40px; height: 40px; margin: 0 auto;"></div>
    </div>
    <h2>Scanning in Progress</h2>
    <div class="url" id="scanUrl">Loading...</div>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="steps">
      <div class="step" id="step1">
        <span>🔍</span> <span>Connectivity Check</span>
      </div>
      <div class="step" id="step2">
        <span>🔐</span> <span>SSL/TLS Security</span>
      </div>
      <div class="step" id="step3">
        <span>🛡️</span> <span>Security Headers</span>
      </div>
      <div class="step" id="step4">
        <span>💉</span> <span>Injection Tests</span>
      </div>
      <div class="step" id="step5">
        <span>🔓</span> <span>Access Control Check</span>
      </div>
      <div class="step" id="step6">
        <span>📊</span> <span>Generating Report</span>
      </div>
    </div>

    <!-- Fun Fact Box -->
    <div class="fact-box" id="factBox">
      <div class="fact-icon">🔒</div>
      <div class="fact-title">Did You Know?</div>
      <div class="fact-text" id="factText">Loading security facts...</div>
      <div class="fact-source" id="factSource"></div>
    </div>

    <div class="status-text" id="statusText">
      Initializing scanner...
    </div>
    <div class="redirect-message" id="redirectMsg"></div>
  </div>
</div>

<script>
let scanId = null;
let checkInterval = null;
let factInterval = null;

// ============================================
// VERIFIED SECURITY FACTS - 11 Facts
// All facts have been verified for accuracy
// ============================================
const securityFacts = [
    { fact: "The first recorded cyberattack happened in 1834! Attackers stole financial market information by hacking the French Telegraph System.", source: "Interesting Engineering" },
    { fact: "The average cost of a data breach in 2024 is $4.88 million USD.", source: "IBM Cost of a Data Breach Report" },
    { fact: "The first computer virus, called 'Creeper,' was created in 1971 as an experiment.", source: "History of Computing" },
    { fact: "The 'Heartbleed' bug in 2014 affected 17% of all secure web servers worldwide.", source: "Codenomicon" },
    { fact: "Only 5% of company folders are properly protected, leaving 95% at risk.", source: "Varonis Data Risk Report" },
    { fact: "The first ransomware attack using Bitcoin occurred in 2013 (CryptoLocker), demanding payment in cryptocurrency.", source: "FBI" },
    { fact: "SQL Injection attacks were first discovered in 1998 and documented in Phrack Magazine #54.", source: "Phrack Magazine" },
    { fact: "Multi-factor authentication (MFA) blocks 99.9% of account takeover attacks.", source: "Microsoft" },
    { fact: "The first 'phishing' attack was documented in 1995 targeting AOL users.", source: "AOL" },
    { fact: "The most common password worldwide is still '123456' - change it immediately!", source: "NordPass" },
    { fact: "HTTP Strict Transport Security (HSTS) forces browsers to only connect via HTTPS, preventing SSL stripping attacks.", source: "OWASP" }
];

function rotateFact() {
    // Pick a random fact from the verified list
    const randomIndex = Math.floor(Math.random() * securityFacts.length);
    const fact = securityFacts[randomIndex];
    document.getElementById('factText').innerHTML = fact.fact;
    document.getElementById('factSource').innerHTML = `📚 Source: ${fact.source}`;
}

// Change fact every 8 seconds
function startFactRotation() {
    rotateFact();
    factInterval = setInterval(rotateFact, 8000);
}

// Get scan ID from URL
const urlParams = new URLSearchParams(window.location.search);
scanId = urlParams.get('scan_id');

if (scanId) {
    // Get the URL being scanned
    fetch(`/get-scan-url/${scanId}`)
        .then(response => response.json())
        .then(data => {
            document.getElementById('scanUrl').innerHTML = `Target: <strong style="color:#58a6ff;">${data.url}</strong>`;
        });
    
    // Start checking scan status
    checkInterval = setInterval(checkScanStatus, 2000);
    startFactRotation();
} else {
    document.getElementById('scanUrl').innerHTML = 'No scan in progress';
}

function checkScanStatus() {
    fetch(`/scan-status/${scanId}`)
        .then(response => response.json())
        .then(data => {
            // Update progress bar
            const percent = data.progress_percent;
            document.getElementById('progressBar').style.width = percent + '%';
            
            // Update status text
            document.getElementById('statusText').innerHTML = data.current_step;
            
            // Update steps based on progress
            updateSteps(data.step_index);
            
            // If scan is complete, redirect to results
            if (data.status === 'completed') {
                clearInterval(checkInterval);
                clearInterval(factInterval);
                document.getElementById('statusText').innerHTML = '✅ Scan Complete! Redirecting...';
                document.getElementById('redirectMsg').innerHTML = 'Redirecting to results page...';
                setTimeout(() => {
                    window.location.href = `/results/${scanId}`;
                }, 1500);
            }
            
            // If scan failed
            if (data.status === 'error') {
                clearInterval(checkInterval);
                clearInterval(factInterval);
                document.getElementById('statusText').innerHTML = '❌ Scan failed. Please try again.';
                document.getElementById('redirectMsg').innerHTML = '<a href="/dashboard" style="color:#58a6ff;">← Back to Dashboard</a>';
            }
        })
        .catch(error => {
            console.error('Error checking status:', error);
        });
}

function updateSteps(stepIndex) {
    const steps = ['step1', 'step2', 'step3', 'step4', 'step5', 'step6'];
    for (let i = 0; i < steps.length; i++) {
        const stepElement = document.getElementById(steps[i]);
        if (i < stepIndex) {
            stepElement.className = 'step completed';
            stepElement.innerHTML = stepElement.innerHTML.replace('🔍', '✅').replace('🔐', '✅').replace('🛡️', '✅').replace('💉', '✅').replace('🔓', '✅').replace('📊', '✅');
        } else if (i === stepIndex) {
            stepElement.className = 'step active';
        } else {
            stepElement.className = 'step step-pending';
        }
    }
}
</script>
</body>
</html>
